.gps-roads{position:absolute;inset:0}

.gps-pulse.online{background:rgba(34,197,94,.3)}.gps-pulse.idle{background:rgba(245,158,11,.3)}

/* GPS simulation - move staff positions every 3 seconds */
var gpsTimer=null;
function startGPS(){
  if(gpsTimer)return;
  gpsTimer=setInterval(function(){
    FIELD_STAFF.forEach(function(sf){
      if(sf.status==='online'){
        sf.lat=Math.max(10,Math.min(90,sf.lat+(Math.random()*4-2)));
        sf.lng=Math.max(10,Math.min(90,sf.lng+(Math.random()*4-2)));
        sf.speed=Math.floor(Math.random()*25)+' km/h';
        sf.lastSeen='Just now';
      }
    });
    if(S.user&&S.user.role==='dg'&&S.nav==='gps_monitor'){
      var pg=document.getElementById('gps-page');
      if(pg)pg.innerHTML=gpsMonitorContent();
      attachGPSEvents();
    }
  },3000);
}
function stopGPS(){if(gpsTimer){clearInterval(gpsTimer);gpsTimer=null;}}

/* ── MODALS ── */
function showModal(){
  var ex=document.getElementById('mov');if(ex)ex.remove();
  var ov=document.createElement('div');ov.className='mov';ov.id='mov';
  if(S.modal==='view')ov.innerHTML=viewModal();
  else if(S.modal==='rev')ov.innerHTML=revModal();
  else if(S.modal==='fix')ov.innerHTML=fixModal();
  else if(S.modal==='pay')ov.innerHTML=payModalHtml();
  else if(S.modal==='dgcustom')ov.innerHTML=dgCustomModal();
  else if(S.modal==='lockconfirm')ov.innerHTML=lockConfirmModal();
  document.body.appendChild(ov);
  ov.addEventListener('click',function(e){if(e.target===ov)closeM();});
  window.submitRev=function(action){
    var c=document.getElementById('rcom');var cval=c?c.value:'';
    var a=S.selApp;var role=S.revRole;if(!a)return;
    a.comments[role]=cval||a.comments[role]||'';a.review[role]=action;
    if(role==='frontdesk'&&action==='approved')a.status='dept_review';
    else if(role==='frontdesk'&&action==='correction')a.status='correction';
    else if(role==='frontdesk'&&action==='rejected')a.status='rejected';
    else if(role==='dg'&&action==='approved'){a.status='approved';var now=new Date();var exp=new Date(now.getTime()+365*24*3600*1000);a.permit={number:'KBP/KAD/2025/'+a.id.split('-')[2],issued:now.toISOString().slice(0,10),expires:exp.toISOString().slice(0,10)};}
    else if(role==='dg'&&action==='rejected')a.status='rejected';
    alert('Decision: '+action.toUpperCase()+'\nApplication '+a.id+' has been updated.');closeM();render();
  };
}

/* Lock confirm modal */
function lockConfirmModal(){
  var email=S.lockTarget;var u=USERS[email];if(!u)return'';
  var isLocked=STAFF_ACCESS[email]&&STAFF_ACCESS[email].locked;
  return '<div class="modal"><div class="mhdr"><div class="mttl">'+(isLocked?'Unlock Account':'Lock Account')+': '+u.name+'</div><button class="mclose" onclick="closeM()">×</button></div>'
    +'<div class="mbdy">'
    +(isLocked
      ?'<div class="notif success"><div class="nic">🔓</div><div><div class="nttl">Restore Access</div><div class="nsb">'+u.name+'\'s account will be unlocked and they will regain full system access.</div></div></div>'
      :'<div class="notif danger"><div class="nic">🔒</div><div><div class="nttl">Suspend Account</div><div class="nsb">'+u.name+' will be immediately locked out and cannot log in until unlocked.</div></div></div>')
    +(!isLocked?'<div class="fgrp"><label class="flbl">Reason for Lockout</label><textarea class="fctl" id="lock-reason" rows="2" placeholder="State reason for suspension..."></textarea></div>':'')
    +'</div>'
    +'<div class="mftr"><button class="btn bgh" onclick="closeM()">Cancel</button>'
    +'<button class="btn '+(isLocked?'bgr':'brd')+'" onclick="confirmLock(\''+email+'\')">'+(isLocked?'Unlock Account':'Lock Account')+'</button>'
    +'</div></div>';
}

function attachApp(){
  window.go=function(n){S.nav=n;if(n!=='gps_monitor')stopGPS();render();};
  window.setStep=function(n){S.fstep=n;render();};
  window.fakeUp=function(k){S.docs[k]=true;render();};
  window.openPayModal=function(){S.modal='pay';showModal();};
  window.viewApp=function(id){S.selApp=APPS.find(function(a){return a.id===id;});S.modal='view';showModal();};
  window.openRev=function(id,role){S.selApp=APPS.find(function(a){return a.id===id;});S.revRole=role;S.modal='rev';showModal();};
  window.fixApp=function(id){S.selApp=APPS.find(function(a){return a.id===id;});S.modal='fix';showModal();};
  window.closeM=function(){S.modal=null;var o=document.getElementById('mov');if(o)o.remove();};
  window.subApp=function(){alert('Application submitted!\nID: KBP-2025-0'+Math.floor(Math.random()*900+100)+'\nYou will receive SMS and email notifications.');S.fstep=1;S.nav='my_apps';render();};
  window.logout=function(){S.user=null;S.view='login';S.nav='dashboard';stopGPS();render();};
  window.doTrack=function(){var id=document.getElementById('tid').value.trim();document.getElementById('tr').innerHTML=trackResult(id);};

  /* DG Override actions */
  window.dgOverride=function(id,action){
    var a=APPS.find(function(x){return x.id===id;});if(!a)return;
    var confirmMsg=action==='approved'?'Force APPROVE application '+id+'? This will bypass all department reviews and issue a permit immediately.'
      :action==='rejected'?'Force REJECT application '+id+'? This will close the application regardless of its current stage.'
      :'Reset application '+id+' to submitted status?';
    if(!confirm(confirmMsg))return;
    if(action==='approved'){a.status='approved';var now=new Date();var exp=new Date(now.getTime()+365*24*3600*1000);a.permit={number:'KBP/KAD/2025/'+a.id.split('-')[2],issued:now.toISOString().slice(0,10),expires:exp.toISOString().slice(0,10)};['frontdesk','dev_control','monitoring','urban_planning','dg'].forEach(function(d){a.review[d]='approved';});a.comments.dg='DG OVERRIDE: Force approved by Director General.';}
    else if(action==='rejected'){a.status='rejected';a.comments.dg='DG OVERRIDE: Force rejected by Director General.';}
    else if(action==='reset'){a.status='submitted';a.permit=null;['frontdesk','dev_control','monitoring','urban_planning','dg'].forEach(function(d){a.review[d]='pending';});}
    alert('Override executed successfully!\nApplication '+id+' is now: '+a.status.toUpperCase());render();
  };
  window.openDGOverrideModal=function(id){S.selApp=APPS.find(function(a){return a.id===id;});S.modal='dgcustom';showModal();};
  window.submitDGOverride=function(){
    var action=document.getElementById('ov-action')?.value;
    var reason=document.getElementById('ov-reason')?.value;
    var code=document.getElementById('ov-code')?.value;
    if(!reason){alert('Please state the reason for this override.');return;}
    if(code!=='DG-2025'){alert('Invalid DG authorization code.\nUse: DG-2025');return;}
    var a=S.selApp;if(!a)return;
    a.status=action;
    if(action==='approved'){var now=new Date();var exp=new Date(now.getTime()+365*24*3600*1000);a.permit={number:'KBP/KAD/2025/'+a.id.split('-')[2],issued:now.toISOString().slice(0,10),expires:exp.toISOString().slice(0,10)};['frontdesk','dev_control','monitoring','urban_planning','dg'].forEach(function(d){a.review[d]='approved';});}
    a.comments.dg='DG CUSTOM OVERRIDE: '+reason;
    alert('Custom override executed!\nApplication '+a.id+'\nNew Status: '+action.toUpperCase()+'\nLogged with DG credentials.');
    closeM();render();
  };

  /* Staff lock/unlock */
  window.toggleLock=function(email){S.lockTarget=email;S.modal='lockconfirm';showModal();};
  window.confirmLock=function(email){
    var acc=STAFF_ACCESS[email];if(!acc)return;
    var reason='';
    if(!acc.locked){var el=document.getElementById('lock-reason');reason=el?el.value:'Administrative suspension';if(!reason){alert('Please provide a reason for the lockout.');return;}}
    acc.locked=!acc.locked;acc.lockedReason=acc.locked?reason:'';
    var u=USERS[email];
    alert((acc.locked?'Account LOCKED: ':'Account UNLOCKED: ')+u.name+'\n'+(acc.locked?'Reason: '+reason:'Full access restored.'));
    closeM();render();
  };
  window.lockAllStaff=function(){
    if(!confirm('Lock ALL staff accounts? This will immediately suspend access for all 6 staff members.'))return;
    var reason='Mass lockout by Director General — '+new Date().toLocaleString();
    Object.keys(STAFF_ACCESS).forEach(function(k){STAFF_ACCESS[k].locked=true;STAFF_ACCESS[k].lockedReason=reason;});
    alert('All staff accounts have been locked.');render();
  };

  /* GPS */
  window.selStaff=function(email){S.selStaff=email;var pg=document.getElementById('gps-page');if(pg){pg.innerHTML=gpsMonitorContent();attachGPSEvents();}};
}

function attachGPSEvents(){
  window.selStaff=function(email){S.selStaff=email;var pg=document.getElementById('gps-page');if(pg){pg.innerHTML=gpsMonitorContent();attachGPSEvents();}};
}

render();
</script>
