.logo-nm{color:#fff;font-size:18px;font-weight:700}.logo-sb{color:#93C5FD;font-size:11px;letter-spacing:1px;text-transform:uppercase}
.auth-ttl{color:rgba(255,255,255,.8);font-size:14px;margin-top:6px}
.auth-body{padding:28px 32px}
.flb{display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fin{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;outline:none}
.fin:focus{border-color:#2563EB}
.fg{margin-bottom:16px}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#1B4F8A,#2563EB);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.creds{background:#F0F9FF;border:1px solid #BAE6FD;border-radius:8px;padding:12px;margin-top:14px}
.creds-ttl{font-size:11px;font-weight:700;color:#0369A1;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.cr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed #BAE6FD;cursor:pointer}
.cr:last-child{border-bottom:none}
.cr-role{font-size:11px;font-weight:600;color:#0369A1}
.cr-info{font-size:10px;color:#0284C7;font-family:monospace}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#0F2D50,#1B4F8A);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-row{display:flex;align-items:center;gap:10px}
.sb-ic{width:36px;height:36px;background:#F59E0B;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}

.nav-sec{padding:8px 18px 4px;font-size:10px;font-weight:700;color:#93C5FD;text-transform:uppercase;letter-spacing:.8px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,.75);font-size:13px;border-left:3px solid transparent;transition:all .15s}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#F59E0B}
.sb-ft{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.uch{display:flex;align-items:center;gap:10px}
.uav{width:32px;height:32px;border-radius:50%;background:#F59E0B;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.unm{color:#fff;font-size:12px;font-weight:600}.url{color:#93C5FD;font-size:10px}
.exit-btn{margin-left:auto;background:rgba(255,255,255,.1);border:none;color:#93C5FD;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-ttl{font-size:18px;font-weight:700;color:#1e293b}

.page{flex:1;overflow-y:auto;padding:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;box-shadow:var(--sh);margin-bottom:20px}
.csm{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat.blue::before{background:linear-gradient(90deg,#1B4F8A,#2563EB)}

.sval{font-size:28px;font-weight:800;color:#1e293b;line-height:1}

.tw{overflow-x:auto;border-radius:10px;border:1px solid #e2e8f0}

td{padding:12px 14px;border-bottom:1px solid #f1f5f9;color:#1e293b;vertical-align:middle}

.aid{font-family:monospace;font-size:11px;color:#2563EB;font-weight:700}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.bbl{background:#1B4F8A;color:#fff}.bgr{background:#059669;color:#fff}.brd{background:#DC2626;color:#fff}.bam{background:#D97706;color:#fff}
.bgh{background:transparent;color:#64748b;border:1px solid #e2e8f0}.bgh:hover{background:#f1f5f9}
.bsm{padding:5px 11px;font-size:12px;border-radius:6px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.fgrp{margin-bottom:16px}
.flbl{display:block;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.fctl{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;color:#1e293b;outline:none;background:#fff}

.fsel{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;color:#1e293b;outline:none;background:#fff}
.tl{display:flex;flex-direction:column}
.tl-it{display:flex;gap:14px;position:relative}

.tld{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1}

.tlc{padding:4px 0 20px}

.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.st{font-size:15px;font-weight:700;color:#1e293b}
.dvd{height:1px;background:#e2e8f0;margin:20px 0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.notif{display:flex;gap:12px;padding:12px 14px;border-radius:8px;margin-bottom:10px;border:1px solid}
.notif.info{background:#EFF6FF;border-color:#BFDBFE}.notif.success{background:#F0FDF4;border-color:#BBF7D0}.notif.warning{background:#FFFBEB;border-color:#FDE68A}
.nic{font-size:16px;flex-shrink:0;margin-top:1px}
.nttl{font-size:13px;font-weight:600;color:#1e293b}.nsb{font-size:12px;color:#64748b;margin-top:2px}.nt{font-size:10px;color:#94a3b8;margin-top:4px}
.permit-w{background:linear-gradient(135deg,#f0f9ff,#fff);border:2px solid #BFDBFE;border-radius:12px;padding:24px;text-align:center}
.permit-seal{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#1B4F8A,#2563EB);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff}
.permit-num{font-size:20px;font-weight:800;color:#1B4F8A;font-family:monospace;letter-spacing:2px;margin:8px 0}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:var(--shl)}
.mhdr{padding:18px 22px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mttl{font-size:16px;font-weight:700;color:#1e293b}
.mclose{background:none;border:none;font-size:20px;cursor:pointer;color:#64748b;line-height:1;padding:0 4px}
.mbdy{padding:22px}
.mftr{padding:16px 22px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}
.rsec{background:#F8FAFC;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.rttl{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.rf{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #E2E8F0;font-size:13px}
.rf:last-child{border-bottom:none}
.rfl{color:#64748b}.rfv{color:#1e293b;font-weight:600;text-align:right;max-width:60%}
.cmt{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:12px;margin-top:10px}
.feer{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F1F5F9;font-size:13px}
.feer.tot{border-bottom:none;font-weight:700;font-size:15px;color:#1B4F8A;margin-top:4px;padding-top:12px;border-top:2px solid #e2e8f0}
.sbar{display:flex;align-items:center;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px;flex:1}
.snum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step.done .snum{background:#059669;color:#fff}.step.active .snum{background:#1B4F8A;color:#fff}.step.pend .snum{background:#E2E8F0;color:#94A3B8}
.slb{font-size:11px;font-weight:600}.step.done .slb{color:#059669}.step.active .slb{color:#1B4F8A}.step.pend .slb{color:#94A3B8}
.sline{flex:1;height:2px;background:#E2E8F0;margin:0 4px}
.bnot{background:#EF4444;color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700}
</style>
</head>

  docs:{titleDeed:false,surveyPlan:false,arcDrawings:false,structuralDrawings:false,insurance:false}};

const fmt=n=>'N'+n.toLocaleString();
const totalRev=()=>APPS.filter(a=>a.status==='approved').reduce((s,a)=>s+a.fees.reduce((f,x)=>f+x.amount,0),0);
const ini=n=>n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
// Revenue card is ONLY shown for dg and records roles
const canSeeRevenue=()=>['dg','records'].includes(S.user?.role);

function bdg(s){
  const m={submitted:'b-sub Submitted',dept_review:'b-dept Dept. Review',dg_review:'b-dg DG Review',approved:'b-ok Approved',rejected:'b-rej Rejected',correction:'b-cor Correction'};
  const v=(m[s]||'b-sub '+s).split(' ');
  return '<span class="badge '+v[0]+'">'+v.slice(1).join(' ')+'</span>';
}

function render(){
  const app=document.getElementById('app');
  if(S.view==='login'){app.innerHTML=loginPage();attachLogin();return;}
  app.innerHTML=shell();attachApp();
  if(S.modal)showModal();
}

function loginPage(){
  const rl={citizen:'Citizen',frontdesk:'Front Desk',town_planning:'Town Planning',survey:'Survey Unit',engineering:'Engineering',environmental:'Environmental',records:'Records',dg:'Director General'};
  return '<div class="auth-wrap"><div class="auth-card">'
    +'<div class="auth-hdr"><div class="auth-logo"><div class="logo-ic">K</div><div><div class="logo-nm">KASUPDA</div><div class="logo-sb">Kaduna State Urban Planning</div></div></div><div class="auth-ttl">Building Permit Application System</div></div>'
    +'<div class="auth-body">'
    +'<div class="fg"><label class="flb">Email Address</label><input class="fin" id="le" type="email" value="citizen@kasupda.ng"></div>'
    +'<div class="fg"><label class="flb">Password</label><input class="fin" id="lp" type="password" value="citizen123"></div>'
    +'<button class="btn-login" onclick="doLogin()">Sign In to Portal</button>'
    +'<div class="creds"><div class="creds-ttl">Demo Credentials - click to fill</div>'
    +Object.entries(USERS).map(function(e){return '<div class="cr" onclick="fillC(\''+e[0]+'\',\''+e[1].pw+'\')"><span class="cr-role">'+rl[e[1].role]+'</span><span class="cr-info">'+e[0]+' / '+e[1].pw+'</span></div>';}).join('')
    +'</div></div></div></div>';
}

function attachLogin(){
  window.doLogin=function(){
    var e=document.getElementById('le').value.trim().toLowerCase();
    var p=document.getElementById('lp').value.trim();
    var u=USERS[e];
    if(u&&u.pw===p){S.user=Object.assign({},u,{email:e});S.view='app';S.nav=u.role==='citizen'?'my_apps':'dashboard';render();}
    else alert('Invalid credentials. Please try again.');
  };
  window.fillC=function(e,p){document.getElementById('le').value=e;document.getElementById('lp').value=p;};
}

function renderPage(){
  var r=S.user.role,n=S.nav;
  if(r==='citizen'){
    if(n==='my_apps')return citizenApps();
    if(n==='new_app')return newApp();
    if(n==='track')return trackPage();
    if(n==='notifications')return notifsPage();
    if(n==='download')return downloadPage();
  }
  if(r==='frontdesk'){
    if(n==='dashboard')return fdDash();   // NO revenue
    if(n==='inbox')return inboxPage();
    if(n==='all_apps')return allApps();
  }
  if(r==='dg'){
    if(n==='dashboard'||n==='pending')return dgDash();  // HAS revenue
    if(n==='all_apps')return allApps();
    if(n==='reports')return reportsPage();
  }
  if(r==='records'){
    if(n==='dashboard')return recDash();  // HAS revenue
    if(n==='all_apps')return allApps();
    if(n==='reports')return reportsPage();
  }
  // All department roles: town_planning, survey, engineering, environmental — NO revenue
  return deptDash();
}

function trackResult(id){
  var a=APPS.find(function(x){return x.id===id;});
  if(!a)return '<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:40px;opacity:.4;margin-bottom:12px">🔍</div><div style="color:#64748b">Application not found.</div></div>';
  var stages=[
    {k:'s',l:'Submitted',ic:'📤',sub:'Received by KASUPDA'},
    {k:'fd',l:'Front Desk Review',ic:'🗂️',sub:'Document verification'},
    {k:'dept',l:'Department Review',ic:'🏛️',sub:'Town Planning, Survey, Engineering, Environmental'},
    {k:'dg',l:'DG Approval',ic:'👔',sub:'Final decision'},
    {k:'done',l:'Permit Issued',ic:'📜',sub:'Permit with QR Code'}
  ];
  function st(k){
    if(a.status==='approved')return'done';
    if(k==='s')return'done';
    if(k==='fd')return a.review.frontdesk==='approved'?'done':'act';
    if(k==='dept')return(a.status==='dept_review'||a.status==='dg_review')?'act':'pend';
    if(k==='dg')return a.status==='dg_review'?'act':'pend';
    return a.status==='approved'?'done':'pend';
  }
  return '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><div><div class="st">'+a.id+'</div><div style="font-size:12px;color:#64748b;margin-top:2px">'+a.type+' - '+a.location+'</div></div>'+bdg(a.status)+'</div>'
    +'<div class="tl">'+stages.map(function(sg){
      var sv=st(sg.k);
      return '<div class="tl-it"><div class="tld '+sv+'">'+(sv==='done'?'✓':sv==='act'?'●':'○')+'</div>'
        +'<div class="tlc"><div class="tlttl">'+sg.ic+' '+sg.l+'</div><div class="tlsb">'+sg.sub+'</div>'
        +(sv==='done'?'<div class="tlt">Completed</div>':sv==='act'?'<div class="tlt" style="color:#2563EB">In Progress</div>':'')
        +'</div></div>';
    }).join('')+'</div></div>';
}

/* ── MODALS ── */
function showModal(){
  var ex=document.getElementById('mov');if(ex)ex.remove();
  var ov=document.createElement('div');ov.className='mov';ov.id='mov';
  if(S.modal==='view')ov.innerHTML=viewModal();
  else if(S.modal==='rev')ov.innerHTML=revModal();
  else if(S.modal==='fix')ov.innerHTML=fixModal();
  else if(S.modal==='pay')ov.innerHTML=payModalHtml();
  document.body.appendChild(ov);
  ov.addEventListener('click',function(e){if(e.target===ov)closeM();});
  window.submitRev=function(action){
    var c=document.getElementById('rcom');var cval=c?c.value:'';
    var a=S.selApp;var role=S.revRole;if(!a)return;
    a.comments[role]=cval||a.comments[role]||'';
    a.review[role]=action;
    if(role==='frontdesk'&&action==='approved')a.status='dept_review';
    else if(role==='frontdesk'&&action==='correction')a.status='correction';
    else if(role==='frontdesk'&&action==='rejected')a.status='rejected';
    else if(role==='dg'&&action==='approved'){
      a.status='approved';
      var now=new Date();
      var exp=new Date(now.getTime()+365*24*3600*1000);
      a.permit={number:'KBP/KAD/2025/'+a.id.split('-')[2],issued:now.toISOString().slice(0,10),expires:exp.toISOString().slice(0,10)};
    }
    else if(role==='dg'&&action==='rejected')a.status='rejected';
    alert('Decision: '+action.toUpperCase()+'\nApplication '+a.id+' has been updated.');
    closeM();render();
  };
}

function viewModal(){

  return '<div class="modal"><div class="mhdr"><div class="mttl">Application: '+a.id+'</div><button class="mclose" onclick="closeM()">x</button></div>'
    +'<div class="mbdy">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">'+bdg(a.status)+'<span style="font-size:12px;color:#64748b">'+a.date+'</span></div>'
    +'<div class="rsec"><div class="rttl">Applicant</div>'
    +'<div class="rf"><span class="rfl">Name</span><span class="rfv">'+a.applicant.title+' '+a.applicant.first+' '+a.applicant.middle+' '+a.applicant.surname+'</span></div>'
    +'<div class="rf"><span class="rfl">Phone</span><span class="rfv">'+a.applicant.phone+'</span></div>'
    +'<div class="rf"><span class="rfl">Email</span><span class="rfv">'+a.applicant.email+'</span></div>'
    +'<div class="rf"><span class="rfl">ID</span><span class="rfv">'+a.applicant.id+'</span></div></div>'
    +'<div class="rsec"><div class="rttl">Property</div>'
    +'<div class="rf"><span class="rfl">Type</span><span class="rfv">'+a.type+'</span></div>'
    +'<div class="rf"><span class="rfl">Land Use</span><span class="rfv">'+a.property.landUse+'</span></div>'
    +'<div class="rf"><span class="rfl">Zone</span><span class="rfv">'+a.property.zone+'</span></div>'
    +'<div class="rf"><span class="rfl">Location</span><span class="rfv">'+a.property.streetName+', '+a.property.district+'</span></div>'
    +'<div class="rf"><span class="rfl">Floors</span><span class="rfv">'+a.property.noFloors+'</span></div>'
    +'<div class="rf"><span class="rfl">Est. Cost</span><span class="rfv">'+a.property.estCost+'</span></div></div>'
    +'<div class="rsec"><div class="rttl">Department Reviews</div>'
    +['frontdesk','town_planning','survey','engineering','environmental'].map(function(d){
      var sv=a.review[d];
      var col=sv==='approved'?'#059669':sv==='rejected'?'#DC2626':'#64748b';
      return '<div class="rf"><span class="rfl">'+deptLabels[d]+'</span><span class="rfv" style="color:'+col+'">'+( sv?sv[0].toUpperCase()+sv.slice(1):'Pending')+'</span></div>';
    }).join('')+'</div>'
    +(Object.keys(a.comments).length?'<div class="cmt"><div style="font-size:11px;font-weight:700;color:#92400E;margin-bottom:5px">Comments</div>'
      +Object.entries(a.comments).map(function(e){return '<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:#92400E;text-transform:capitalize">'+e[0].replace('_',' ')+':</span><div style="font-size:12px;color:#78350F;margin-top:2px">'+e[1]+'</div></div>';}).join('')+'</div>':'')
    +'<div class="rsec" style="margin-top:14px"><div class="rttl">Fees</div>'
    +a.fees.map(function(f){return '<div class="feer"><span>'+f.desc+'</span><span>'+fmt(f.amount)+'</span></div>';}).join('')
    +'<div class="feer tot"><span>Total</span><span>'+fmt(a.fees.reduce(function(s,f){return s+f.amount;},0))+'</span></div></div>'
    +'</div><div class="mftr"><button class="btn bgh" onclick="closeM()">Close</button></div></div>';
}

function revModal(){
  var a=S.selApp,role=S.revRole;if(!a)return'';
  var lb={frontdesk:'Front Desk',town_planning:'Town Planning',survey:'Survey Unit',engineering:'Engineering',environmental:'Environmental',dg:'Director General'};
  var isDG=role==='dg';
  return '<div class="modal"><div class="mhdr"><div>'
    +'<div class="mttl">'+(isDG?'DG Final Review':'Dept. Review')+': '+a.id+'</div>'
    +'<div style="font-size:12px;color:#64748b;margin-top:2px">'+lb[role]+' - '+a.owner+'</div>'
    +'</div><button class="mclose" onclick="closeM()">x</button></div>'
    +'<div class="mbdy">'
    +'<div class="rsec"><div class="rttl">Summary</div>'
    +'<div class="rf"><span class="rfl">Type</span><span class="rfv">'+a.type+'</span></div>'
    +'<div class="rf"><span class="rfl">Location</span><span class="rfv">'+a.location+'</span></div>'
    +'<div class="rf"><span class="rfl">Zone</span><span class="rfv">'+a.property.zone+'</span></div>'
    +'<div class="rf"><span class="rfl">Floors</span><span class="rfv">'+a.property.noFloors+'</span></div>'
    +'<div class="rf"><span class="rfl">Est. Cost</span><span class="rfv">'+a.property.estCost+'</span></div></div>'
    +(isDG?'<div class="rsec"><div class="rttl">Dept. Sign-offs</div>'
      +['town_planning','survey','engineering','environmental'].map(function(d){
        var lb2={town_planning:'Town Planning',survey:'Survey',engineering:'Engineering',environmental:'Environmental'};
        var sv=a.review[d];
        return '<div class="rf"><span class="rfl">'+lb2[d]+'</span><span class="rfv" style="color:'+(sv==='approved'?'#059669':'#D97706')+'">'+(sv==='approved'?'Approved':'Pending')+'</span></div>';
      }).join('')+'</div>':'')
    +'<div class="fgrp"><label class="flbl">Review Comment</label><textarea class="fctl" id="rcom" rows="3" placeholder="Add your comment...">'+( a.comments[role]||'')+'</textarea></div>'
    +'<div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Decision</div>'
    +'<div style="display:flex;gap:10px">'
    +(role==='frontdesk'?'<button class="btn bam" onclick="submitRev(\'correction\')">Request Correction</button>':'')
    +'<button class="btn brd" onclick="submitRev(\'rejected\')">Reject</button>'
    +'<button class="btn bgr" onclick="submitRev(\'approved\')">'+(isDG?'Approve & Issue Permit':'Approve')+'</button>'
    +'</div></div></div>';
}

function fixModal(){
  var a=S.selApp;if(!a)return'';
  return '<div class="modal"><div class="mhdr"><div class="mttl">Fix Correction: '+a.id+'</div><button class="mclose" onclick="closeM()">x</button></div>'
    +'<div class="mbdy">'

function payModalHtml(){
  return '<div class="modal"><div class="mhdr"><div class="mttl">Online Payment</div><button class="mclose" onclick="closeM()">x</button></div>'
    +'<div class="mbdy">'
    +'<div style="text-align:center;padding:16px 0"><div style="font-size:32px">💳</div><div style="font-size:24px;font-weight:800;color:#1B4F8A;margin:8px 0">N85,000</div><div style="font-size:13px;color:#64748b">Total Amount Due</div></div>'
    +'<div class="fgrp"><label class="flbl">Card Number</label><input class="fctl" placeholder="4242 4242 4242 4242"></div>'
    +'<div class="frow"><div><label class="flbl">Expiry</label><input class="fctl" placeholder="MM/YY"></div><div><label class="flbl">CVV</label><input class="fctl" placeholder="123"></div></div>'
    +'<div class="fgrp"><label class="flbl">Name on Card</label><input class="fctl" placeholder="Adamu Ibrahim"></div>'
    +'</div>'
    +'<div class="mftr"><button class="btn bgh" onclick="closeM()">Cancel</button><button class="btn bgr" onclick="alert(\'Payment successful!\\nTransaction ID: TXN-2025-84921\');closeM()">Pay N85,000</button></div></div>';

function attachApp(){
  window.go=function(n){S.nav=n;render();};
  window.setStep=function(n){S.fstep=n;render();};
  window.fakeUp=function(k){S.docs[k]=true;render();};
  window.openPayModal=function(){S.modal='pay';showModal();};
  window.viewApp=function(id){S.selApp=APPS.find(function(a){return a.id===id;});S.modal='view';showModal();};
  window.openRev=function(id,role){S.selApp=APPS.find(function(a){return a.id===id;});S.revRole=role;S.modal='rev';showModal();};
  window.fixApp=function(id){S.selApp=APPS.find(function(a){return a.id===id;});S.modal='fix';showModal();};
  window.closeM=function(){S.modal=null;var o=document.getElementById('mov');if(o)o.remove();};
  window.subApp=function(){alert('Application submitted!\nID: KBP-2025-0'+Math.floor(Math.random()*900+100)+'\nYou will receive SMS and email notifications.');S.fstep=1;S.nav='my_apps';render();};
  window.logout=function(){S.user=null;S.view='login';S.nav='dashboard';render();};
  window.doTrack=function(){var id=document.getElementById('tid').value.trim();document.getElementById('tr').innerHTML=trackResult(id);};
}

render();
